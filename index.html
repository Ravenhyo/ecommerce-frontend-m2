<!DOCTYPE html>
<html lang="es">
<head>

    <title>Glow Beauty Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Inicio</a>

                    <h5 class="card-title">Serum Facial</h5>
                    <p class="card-text">$9.990</p>

                </div>
            </div>
        </article>

        <article class="col-12 col-md-6 col-lg-4">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa?auto=format&fit=crop&w=600&q=80" class="card-img-top" alt="Labial matte">

        </article>

        <article class="col-12 col-md-6 col-lg-4">
            <div class="card h-100">

                <div class="card-body">
                    <h5 class="card-title">Paleta de Sombras</h5>
                    <p class="card-text">$12.990</p>
                    <a href="detalle.html" class="btn btn-outline-dark">Ver más</a>
                    <button class="btn btn-primary agregar-carrito">Agregar</button>
                </div>
            </div>
        </article>

    </section>

</main>

<footer class="bg-dark text-white text-center py-3">

</footer>
